name: Supabase Keepalive

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Write keepalive timestamp
        run: |
          curl -sf -X PATCH \
            -H "apikey: sb_publishable_VOXYW8OgRTTh6dBeMo2RSQ_GcCKEaoE" \
            -H "Authorization: Bearer sb_publishable_VOXYW8OgRTTh6dBeMo2RSQ_GcCKEaoE" \
            -H "Content-Type: application/json" \
            -d "{\"pinged_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            "https://agsgdhutsanhqhpcqqan.supabase.co/rest/v1/keepalive?id=eq.1"
